name: Frontend CI

on:
  push:
    branches: ["developV2"]
  pull_request:
    branches: ["developV2"]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Next.js App
        run: npm run build

      - name: Auto-merge PR
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'automerge')
        env:
          GH_TOKEN: ${{ secrets.MY_PAT_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.html_url }}" \
            --squash \
            --subject "${{ github.event.pull_request.title }}" \
            --body "Auto-merged by bot after CI passed. (Label: automerge)"
